<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Geometry Case Files</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    background: linear-gradient(135deg, #101827, #1f2937);
    color: #f8f1df;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .app {
    width: 100%;
    max-width: 950px;
    background: #f7ecd2;
    color: #1f2937;
    border-radius: 24px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    padding: 30px;
  }

  h1, h2, h3 {
    margin: 0;
  }

  .top {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    margin-bottom: 20px;
  }

  .badge {
    background: #1f2937;
    color: #f7ecd2;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 14px;
  }

  .progress {
    height: 12px;
    background: #d8c59f;
    border-radius: 999px;
    overflow: hidden;
    margin: 18px 0;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: #8b5e34;
    transition: width 0.3s;
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  .start {
    text-align: center;
    padding: 45px 20px;
  }

  .start p {
    max-width: 680px;
    margin: 20px auto;
    font-size: 18px;
    line-height: 1.6;
  }

  button {
    border: none;
    background: #1f2937;
    color: #f7ecd2;
    padding: 13px 18px;
    border-radius: 14px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
    font-family: Georgia, "Times New Roman", serif;
  }

  button:hover {
    transform: translateY(-2px);
    background: #374151;
  }

  .case-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }

  .card {
    background: #fff8e8;
    border: 2px solid #d8c59f;
    border-radius: 20px;
    padding: 20px;
  }

  .diagram {
    background: white;
    border-radius: 18px;
    padding: 16px;
    min-height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  svg {
    width: 100%;
    max-height: 300px;
  }

  .prompt {
    font-size: 20px;
    line-height: 1.45;
    margin: 16px 0;
  }

  .choices {
    display: grid;
    gap: 12px;
  }

  .choice {
    width: 100%;
    text-align: left;
    background: #efe0bd;
    color: #1f2937;
    border: 2px solid #d8c59f;
  }

  .choice:hover {
    background: #e4cf9f;
  }

  .choice.correct {
    background: #c8e6c9;
    border-color: #2e7d32;
  }

  .choice.wrong {
    background: #ffcdd2;
    border-color: #b71c1c;
  }

  .feedback {
    margin-top: 18px;
    padding: 16px;
    border-radius: 16px;
    background: #f0dfb8;
    line-height: 1.5;
    display: none;
  }

  .feedback.show {
    display: block;
  }

  .next-btn {
    margin-top: 16px;
    display: none;
  }

  .next-btn.show {
    display: inline-block;
  }

  .end {
    text-align: center;
    padding: 40px 20px;
  }

  .score {
    font-size: 52px;
    margin: 20px 0;
    color: #8b5e34;
  }

  .small {
    font-size: 14px;
    opacity: 0.75;
  }

  @media (max-width: 750px) {
    .case-layout {
      grid-template-columns: 1fr;
    }

    .top {
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>
</head>

<body>
<div class="app">

  <div id="startScreen" class="screen active">
    <div class="start">
      <h1>Geometry Case Files</h1>
      <p>
        Solve textbook-style geometry cases by identifying the theorem,
        postulate, or reason that justifies each step. Each case includes
        a diagram, a reasoning question, and an explanation.
      </p>
      <button onclick="startGame()">Open Case Files</button>
    </div>
  </div>

  <div id="gameScreen" class="screen">
    <div class="top">
      <div>
        <h2 id="caseTitle"></h2>
        <p class="small" id="caseTopic"></p>
      </div>
      <div class="badge" id="scoreBadge">Score: 0</div>
    </div>

    <div class="progress">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="case-layout">
      <div class="card">
        <h3>Diagram</h3>
        <div class="diagram" id="diagramBox"></div>
      </div>

      <div class="card">
        <h3>Case Question</h3>
        <div class="prompt" id="prompt"></div>
        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="nextBtn" onclick="nextCase()">Next Case</button>
      </div>
    </div>
  </div>

  <div id="endScreen" class="screen">
    <div class="end">
      <h1>Case Files Complete</h1>
      <div class="score" id="finalScore"></div>
      <p id="finalMessage"></p>
      <button onclick="restartGame()">Play Again</button>
    </div>
  </div>

</div>

<script>
const cases = [
  {
    title: "Case 1: Parallel Lines",
    topic: "Parallel lines cut by a transversal",
    prompt: "Lines l and m are parallel. Which theorem proves ∠1 ≅ ∠2?",
    answer: "Alternate Interior Angles Theorem",
    choices: [
      "Vertical Angles Theorem",
      "Alternate Interior Angles Theorem",
      "SSS Congruence",
      "Triangle Sum Theorem"
    ],
    explanation: "Since l ∥ m, alternate interior angles formed by the transversal are congruent.",
    diagram: `
      <svg viewBox="0 0 400 300">
        <line x1="50" y1="90" x2="350" y2="90" stroke="#111" stroke-width="4"/>
        <line x1="50" y1="210" x2="350" y2="210" stroke="#111" stroke-width="4"/>
        <line x1="150" y1="40" x2="260" y2="260" stroke="#8b5e34" stroke-width="4"/>
        <text x="360" y="95" font-size="22">l</text>
        <text x="360" y="215" font-size="22">m</text>
        <text x="175" y="125" font-size="28">1</text>
        <text x="225" y="195" font-size="28">2</text>
      </svg>
    `
  },
  {
    title: "Case 2: Triangle Congruence",
    topic: "Congruent triangles",
    prompt: "Given AB ≅ DE, AC ≅ DF, and ∠A ≅ ∠D, which postulate proves △ABC ≅ △DEF?",
    answer: "SAS Congruence",
    choices: [
      "SSS Congruence",
      "SAS Congruence",
      "ASA Congruence",
      "AA Similarity"
    ],
    explanation: "Two sides and the included angle are congruent, so the triangles are congruent by SAS.",
    diagram: `
      <svg viewBox="0 0 500 300">
        <polygon points="80,230 170,70 260,230" fill="none" stroke="#111" stroke-width="4"/>
        <polygon points="300,230 390,70 480,230" fill="none" stroke="#111" stroke-width="4"/>
        <text x="70" y="250" font-size="22">B</text>
        <text x="165" y="60" font-size="22">A</text>
        <text x="260" y="250" font-size="22">C</text>
        <text x="295" y="250" font-size="22">E</text>
        <text x="385" y="60" font-size="22">D</text>
        <text x="480" y="250" font-size="22">F</text>
        <line x1="80" y1="230" x2="170" y2="70" stroke="#8b5e34" stroke-width="6"/>
        <line x1="170" y1="70" x2="260" y2="230" stroke="#8b5e34" stroke-width="6"/>
        <line x1="300" y1="230" x2="390" y2="70" stroke="#8b5e34" stroke-width="6"/>
        <line x1="390" y1="70" x2="480" y2="230" stroke="#8b5e34" stroke-width="6"/>
      </svg>
    `
  },
  {
    title: "Case 3: Isosceles Triangle",
    topic: "Base angles theorem",
    prompt: "In △ABC, AB ≅ AC. Which statement must be true?",
    answer: "∠B ≅ ∠C",
    choices: [
      "∠A ≅ ∠B",
      "∠B ≅ ∠C",
      "BC ≅ AC",
      "AB ∥ BC"
    ],
    explanation: "If two sides of a triangle are congruent, then the angles opposite those sides are congruent.",
    diagram: `
      <svg viewBox="0 0 400 300">
        <polygon points="200,50 90,240 310,240" fill="none" stroke="#111" stroke-width="4"/>
        <text x="195" y="40" font-size="24">A</text>
        <text x="70" y="260" font-size="24">B</text>
        <text x="315" y="260" font-size="24">C</text>
        <line x1="200" y1="50" x2="90" y2="240" stroke="#8b5e34" stroke-width="6"/>
        <line x1="200" y1="50" x2="310" y2="240" stroke="#8b5e34" stroke-width="6"/>
      </svg>
    `
  },
  {
    title: "Case 4: Similar Triangles",
    topic: "AA similarity",
    prompt: "If ∠A ≅ ∠D and ∠B ≅ ∠E, what proves △ABC ∼ △DEF?",
    answer: "AA Similarity",
    choices: [
      "AA Similarity",
      "SAS Congruence",
      "CPCTC",
      "Triangle Inequality"
    ],
    explanation: "Two pairs of corresponding angles are congruent, so the triangles are similar by AA.",
    diagram: `
      <svg viewBox="0 0 500 300">
        <polygon points="70,230 150,90 240,230" fill="none" stroke="#111" stroke-width="4"/>
        <polygon points="290,230 390,50 480,230" fill="none" stroke="#111" stroke-width="4"/>
        <text x="145" y="80" font-size="22">A</text>
        <text x="55" y="250" font-size="22">B</text>
        <text x="240" y="250" font-size="22">C</text>
        <text x="385" y="40" font-size="22">D</text>
        <text x="275" y="250" font-size="22">E</text>
        <text x="480" y="250" font-size="22">F</text>
      </svg>
    `
  },
  {
    title: "Case 5: Parallelogram",
    topic: "Properties of parallelograms",
    prompt: "ABCD is a parallelogram. Which statement is always true?",
    answer: "Opposite sides are congruent",
    choices: [
      "All four sides are congruent",
      "Opposite sides are congruent",
      "Diagonals are perpendicular",
      "All angles are right angles"
    ],
    explanation: "In every parallelogram, opposite sides are parallel and congruent.",
    diagram: `
      <svg viewBox="0 0 400 300">
        <polygon points="100,80 320,80 260,220 40,220" fill="none" stroke="#111" stroke-width="4"/>
        <text x="90" y="70" font-size="24">A</text>
        <text x="325" y="75" font-size="24">B</text>
        <text x="265" y="245" font-size="24">C</text>
        <text x="25" y="245" font-size="24">D</text>
      </svg>
    `
  },
  {
    title: "Case 6: Circle Angle",
    topic: "Inscribed angle theorem",
    prompt: "An inscribed angle intercepts an arc measuring 100°. What is the measure of the inscribed angle?",
    answer: "50°",
    choices: [
      "25°",
      "50°",
      "100°",
      "200°"
    ],
    explanation: "An inscribed angle measures half of its intercepted arc, so the angle is 100° ÷ 2 = 50°.",
    diagram: `
      <svg viewBox="0 0 400 300">
        <circle cx="200" cy="150" r="110" fill="none" stroke="#111" stroke-width="4"/>
        <line x1="130" y1="235" x2="200" y2="40" stroke="#8b5e34" stroke-width="4"/>
        <line x1="270" y1="235" x2="200" y2="40" stroke="#8b5e34" stroke-width="4"/>
        <path d="M130 235 A110 110 0 0 0 270 235" fill="none" stroke="#b45309" stroke-width="6"/>
        <text x="180" y="275" font-size="24">100° arc</text>
      </svg>
    `
  },
  {
    title: "Case 7: Midsegment",
    topic: "Triangle midsegment theorem",
    prompt: "In △ABC, D and E are midpoints of AB and AC. What must be true about DE?",
    answer: "DE ∥ BC and DE = 1/2 BC",
    choices: [
      "DE ⟂ BC",
      "DE ∥ BC and DE = BC",
      "DE ∥ BC and DE = 1/2 BC",
      "DE bisects ∠A"
    ],
    explanation: "A triangle midsegment is parallel to the third side and half its length.",
    diagram: `
      <svg viewBox="0 0 400 300">
        <polygon points="200,45 75,245 325,245" fill="none" stroke="#111" stroke-width="4"/>
        <line x1="137.5" y1="145" x2="262.5" y2="145" stroke="#8b5e34" stroke-width="5"/>
        <text x="198" y="35" font-size="22">A</text>
        <text x="55" y="265" font-size="22">B</text>
        <text x="330" y="265" font-size="22">C</text>
        <text x="118" y="140" font-size="22">D</text>
        <text x="270" y="140" font-size="22">E</text>
      </svg>
    `
  },
  {
    title: "Case 8: Right Triangle",
    topic: "Pythagorean theorem",
    prompt: "A right triangle has legs 9 and 12. What is the hypotenuse?",
    answer: "15",
    choices: [
      "13",
      "15",
      "18",
      "21"
    ],
    explanation: "Use a² + b² = c². Since 9² + 12² = 81 + 144 = 225, c = 15.",
    diagram: `
      <svg viewBox="0 0 400 300">
        <polygon points="90,230 90,80 290,230" fill="none" stroke="#111" stroke-width="4"/>
        <text x="55" y="160" font-size="24">9</text>
        <text x="180" y="260" font-size="24">12</text>
        <text x="195" y="145" font-size="24">c</text>
        <path d="M90 210 L110 210 L110 230" fill="none" stroke="#8b5e34" stroke-width="3"/>
      </svg>
    `
  }
];

let current = 0;
let score = 0;
let answered = false;

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(screen => {
    screen.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function startGame() {
  current = 0;
  score = 0;
  answered = false;
  showScreen("gameScreen");
  loadCase();
}

function loadCase() {
  answered = false;
  const c = cases[current];

  document.getElementById("caseTitle").textContent = c.title;
  document.getElementById("caseTopic").textContent = c.topic;
  document.getElementById("prompt").textContent = c.prompt;
  document.getElementById("diagramBox").innerHTML = c.diagram;
  document.getElementById("scoreBadge").textContent = `Score: ${score}`;
  document.getElementById("progressFill").style.width = `${(current / cases.length) * 100}%`;

  const choicesBox = document.getElementById("choices");
  choicesBox.innerHTML = "";

  const shuffled = [...c.choices].sort(() => Math.random() - 0.5);

  shuffled.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(btn, choice);
    choicesBox.appendChild(btn);
  });

  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";
  document.getElementById("nextBtn").className = "next-btn";
}

function checkAnswer(button, choice) {
  if (answered) return;
  answered = true;

  const c = cases[current];
  const allButtons = document.querySelectorAll(".choice");

  allButtons.forEach(btn => {
    if (btn.textContent === c.answer) {
      btn.classList.add("correct");
    }
  });

  const feedback = document.getElementById("feedback");

  if (choice === c.answer) {
    score++;
    button.classList.add("correct");
    feedback.innerHTML = `<strong>Correct.</strong> ${c.explanation}`;
  } else {
    button.classList.add("wrong");
    feedback.innerHTML = `<strong>Not quite.</strong> The correct answer is <strong>${c.answer}</strong>. ${c.explanation}`;
  }

  document.getElementById("scoreBadge").textContent = `Score: ${score}`;
  feedback.classList.add("show");
  document.getElementById("nextBtn").classList.add("show");
}

function nextCase() {
  current++;

  if (current >= cases.length) {
    endGame();
  } else {
    loadCase();
  }
}

function endGame() {
  showScreen("endScreen");
  document.getElementById("progressFill").style.width = "100%";
  document.getElementById("finalScore").textContent = `${score} / ${cases.length}`;

  let message = "";

  if (score === cases.length) {
    message = "Perfect case record. Geometry detective status: terrifying.";
  } else if (score >= 6) {
    message = "Strong reasoning. A few theorem details need polishing.";
  } else {
    message = "Good start. Review the explanations and try the case files again.";
  }

  document.getElementById("finalMessage").textContent = message;
}

function restartGame() {
  startGame();
}
</script>
</body>
</html>
